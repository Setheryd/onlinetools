<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#3730a3" text-anchor="middle">Measure Twice.</text>
  <text x="400" y="240" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="url(#g)" text-anchor="middle">Ship Once.</text>
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#6366f1" text-anchor="middle" opacity="0.9">THE TOOL GURU</text>
