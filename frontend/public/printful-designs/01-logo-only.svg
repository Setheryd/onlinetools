<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Abstract icon: two overlapping shapes -->
  <rect x="80" y="120" width="140" height="160" rx="24" fill="url(#iconGrad)" transform="rotate(-8 150 200)"/>
  <rect x="140" y="100" width="140" height="160" rx="24" fill="url(#iconGrad)" fill-opacity="0.9" transform="rotate(6 210 180)"/>
  <rect x="100" y="160" width="100" height="12" rx="4" fill="white" fill-opacity="0.9" transform="rotate(-8 150 166)"/>
  <rect x="100" y="200" width="100" height="12" rx="4" fill="white" fill-opacity="0.9" transform="rotate(-8 150 206)"/>
  <rect x="170" y="140" width="90" height="12" rx="4" fill="white" fill-opacity="0.9" transform="rotate(6 215 146)"/>
  <circle cx="280" cy="200" r="8" fill="white" fill-opacity="0.9"/>
  <!-- Text -->
  <text x="320" y="160" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#3730a3">THE</text>
  <text x="320" y="240" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#3730a3" letter-spacing="2">TOOL GURU</text>
</svg>
